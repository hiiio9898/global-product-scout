name: Daily Scrape

on:
  # 定时触发：北京时间每天 14:00（UTC 6:00）
  schedule:
    - cron: '0 6 * * *'
  # 允许通过 GitHub 网页手动触发
  workflow_dispatch:

# 需要写权限来 push 代码
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-liberation \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libgdk-pixbuf2.0-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            xdg-utils

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # 安装 Playwright 浏览器（Scrapling StealthyFetcher 需要）
          python -m playwright install chromium
          python -m playwright install-deps

      - name: Run daily scrape
        env:
          ACTIVATE_PROVIDER: ${{ secrets.ACTIVATE_PROVIDER }}
          ACTIVATE_MODEL: ${{ secrets.ACTIVATE_MODEL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          AMAZON_BEST_SELLERS_URL: ${{ secrets.AMAZON_BEST_SELLERS_URL }}
          SCRAPE_DELAY_SECONDS: '2'
          SCRAPLING_BROWSER_TIMEOUT: '30000'
          SCRAPLING_STRATEGY: 'fetcher_first'
          DATABASE_PATH: data/products.db
        run: python daily_scrape.py

      - name: Commit and push products.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json
          git diff --cached --quiet || git commit -m "Auto-update: products $(date -u +%Y-%m-%d)"
          git push
