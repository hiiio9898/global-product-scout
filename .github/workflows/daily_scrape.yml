name: Daily Scrape

on:
  schedule:
    - cron: '0 6 * * *'   # 北京时间 14:00
  workflow_dispatch:

permissions:
  contents: write

# 防止同时运行多个爬取任务
concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: playwright-${{ runner.os }}-
      - run: python -m playwright install chromium && python -m playwright install-deps

      - name: Run daily scrape
        env:
          ACTIVATE_PROVIDER: ${{ secrets.ACTIVATE_PROVIDER }}
          ACTIVATE_MODEL: ${{ secrets.ACTIVATE_MODEL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          MIMO_BASE_URL: ${{ secrets.MIMO_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          AMAZON_BEST_SELLERS_URL: ${{ secrets.AMAZON_BEST_SELLERS_URL }}
          SCRAPE_DELAY_SECONDS: '2'
          SCRAPLING_BROWSER_TIMEOUT: '30000'
          SCRAPLING_STRATEGY: 'fetcher_first'
          DATABASE_PATH: data/products.db
        run: python daily_scrape.py --all-regions --skip-analysis

      - name: Commit and push products.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/products.json
          git diff --cached --quiet || git commit -m "Auto-update: products $(date -u +%Y-%m-%d)"
          git push
